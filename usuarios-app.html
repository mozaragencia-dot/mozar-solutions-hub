<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TACAM | App Usuarios</title>
  <link rel="stylesheet" href="delivery.css" />
</head>
<body>
  <header>
    <img src="assets/logo-white.svg" alt="Logo TACAM" />
    <strong>App de Usuarios</strong>
  </header>
  <main>
    <section class="card">
      <h1>Crear pedido</h1>
      <form id="order-form" class="grid">
        <label>Nombre <input name="customer" required /></label>
        <label>Teléfono <input name="phone" required placeholder="+569..." /></label>
        <label>Dirección <input name="address" required /></label>
        <label style="grid-column:1/-1">Detalle <textarea name="notes" rows="3"></textarea></label>
        <button type="submit">Enviar pedido</button>
      </form>
    </section>

    <section class="card">
      <h2>Mis pedidos (por teléfono)</h2>
      <label>Filtrar teléfono <input id="filter-phone" placeholder="+569..." /></label>
      <div class="table-wrap"><table><thead><tr><th>ID</th><th>Dirección</th><th>Estado</th><th>Repartidor</th></tr></thead><tbody id="orders-body"></tbody></table></div>
    </section>

    <div class="footer-sign">
      <img src="assets/logo-color.svg" alt="Logo oficial TACAM" />
      <span>Desarrollo por <strong>Agencia Digital</strong></span>
    </div>
  </main>
  <script src="delivery-core.js"></script>
  <script src="usuarios-app.js"></script>
  <script src="register-sw.js"></script>
</body>
</html>
