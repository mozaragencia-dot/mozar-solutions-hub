<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TACAM | App Repartidores</title>
  <link rel="stylesheet" href="delivery.css" />
</head>
<body>
  <header>
    <img src="assets/logo-white.svg" alt="Logo TACAM" />
    <strong>App de Repartidores</strong>
  </header>
  <main>
    <section class="card">
      <label>Nombre repartidor <input id="courier-name" placeholder="Ej: Juan Pérez" /></label>
    </section>
    <section class="card">
      <h1>Pedidos disponibles</h1>
      <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Dirección</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="courier-body"></tbody></table></div>
    </section>
    <div class="footer-sign">
      <img src="assets/logo-color.svg" alt="Logo oficial TACAM" />
      <span>Desarrollo por <strong>Agencia Digital</strong></span>
    </div>
  </main>
  <script src="delivery-core.js"></script>
  <script src="repartidores-app.js"></script>
  <script src="register-sw.js"></script>
</body>
</html>
